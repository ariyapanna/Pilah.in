<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilah.in ♻️ - Klasifikasi Sampah</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <style>
    body { 
      font-family: 'Titillium Web', 
      sans-serif; 
      background-color:#f8f9fa; 
    }

    video, canvas { 
      border-radius: 12px; 
      background-color: #e9ecef;
    }

    #loader {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      background: linear-gradient(90deg, #e9ecef 25%, #f8f9fa 50%, #e9ecef 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      position: absolute;
      top: 0;
      left: 0;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
  </style>
</head>
<body class="d-flex justify-content-center align-items-center min-vh-100 bg-light">
<div class="container-sm">
  <div class="card shadow-sm mx-auto" style="max-width: 480px;">
    <div class="card-body text-center">
      <h2 class="card-title text-success mb-4">Pilah.in ♻️</h2>

      <!-- Camera / Snapshot -->
      <div class="ratio ratio-4x3 mb-3 position-relative">
        <!-- Shimmer Loader -->
        <div id="loader" class="shimmer"></div>

        <!-- Video & Canvas -->
        <video id="video" class="w-100 h-100 rounded" autoplay playsinline style="display:none;"></video>
        <canvas id="snapshot" style="display:none;"></canvas>
      </div>

      <!-- Buttons -->
      <button id="start-camera-btn" class="btn btn-success btn-lg w-100 mb-2" disabled>📸 Mulai Kamera</button>
      <button id="scan-btn" class="btn btn-success btn-lg w-100" disabled>🚮 Scan Sampah</button>

      <img src="./assets/images/logo_universitas.png" alt="logo pradita" class="mt-4" height="45" />
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script src="./script.js"></script>
</body>
</html>
